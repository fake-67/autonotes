<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоконспект</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxtojson@1.3.0/dist/pptxtojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- ЭКРАН ВХОДА -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <h1>📝 Автоконспект</h1>
                <p class="subtitle">Конспекты лекций с картинками и чат по темам</p>
                <div class="tabs">
                    <button class="tab active" data-tab="login">Вход</button>
                    <button class="tab" data-tab="register">Регистрация</button>
                </div>
                <form id="login-form" class="auth-form active">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <button type="submit">Войти</button>
                </form>
                <form id="register-form" class="auth-form">
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Пароль (мин. 6 символов)" required>
                    <button type="submit">Зарегистрироваться</button>
                </form>
                <p id="auth-error" class="error"></p>
            </div>
        </div>

        <!-- ОСНОВНОЙ ЭКРАН -->
        <div id="main-screen" class="screen">
            <nav>
                <div class="nav-brand">📝 Автоконспект</div>
                <div class="nav-links">
                    <button class="nav-btn active" data-page="conspect">Конспект</button>
                    <button class="nav-btn" data-page="chats">Чаты</button>
                    <button class="nav-btn" data-page="profile">Профиль</button>
                    <button id="logout-btn" class="nav-btn logout">Выйти</button>
                </div>
            </nav>

            <!-- СТРАНИЦА КОНСПЕКТА -->
            <div id="page-conspect" class="page active">
                <div class="conspect-layout">
                    <div class="upload-panel">
                        <h2>Загрузи лекцию</h2>
                        <div id="drop-zone">
                            <div class="drop-icon">📂</div>
                            <p>Перетащи файл или нажми</p>
                            <span class="hint">PDF, DOCX, PPTX, TXT (до 50 МБ)</span>
                            <input type="file" id="file-input" accept=".pdf,.docx,.pptx,.txt" hidden>
                        </div>
                        <div id="file-info" class="hidden">
                            <span id="file-name"></span>
                            <button id="clear-file">✕</button>
                        </div>
                        <div id="loading-bar" class="hidden">
                            <div class="progress"><div class="progress-fill"></div></div>
                            <p id="loading-text">Обрабатываю...</p>
                        </div>
                        <div id="controls" class="hidden">
                            <label>Степень сжатия:</label>
                            <input type="range" id="compression-slider" min="1" max="5" value="3">
                            <div class="range-labels"><span>Кратко</span><span>Подробно</span></div>
                            <button id="generate-btn">Сгенерировать</button>
                        </div>
                        <div class="history-mini" id="history-mini"></div>
                    </div>
                    <div class="result-panel" id="result-panel">
                        <div class="result-actions hidden" id="result-actions">
                            <button id="copy-text-btn">📋 Копировать</button>
                            <button id="export-pdf-btn">📄 PDF</button>
                        </div>
                        <div id="notes-output" class="notes-output"></div>
                        <div id="gallery-output" class="gallery-output"></div>
                    </div>
                </div>
            </div>

            <!-- СТРАНИЦА ЧАТОВ -->
            <div id="page-chats" class="page">
                <div class="chats-layout">
                    <div class="rooms-panel">
                        <div class="rooms-header">
                            <h2>Чаты</h2>
                            <button id="create-room-btn">+ Создать</button>
                        </div>
                        <input type="text" id="search-rooms" placeholder="Поиск по теме...">
                        <div id="rooms-list"></div>
                    </div>
                    <div class="chat-panel" id="chat-panel">
                        <div class="chat-placeholder">Выберите чат или создайте новый</div>
                        <div class="chat-window hidden" id="chat-window">
                            <div class="chat-header">
                                <span id="chat-title"></span>
                                <button id="close-chat">✕</button>
                            </div>
                            <div id="messages-list"></div>
                            <form id="message-form">
                                <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
                                <button type="submit">→</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- СТРАНИЦА ПРОФИЛЯ -->
            <div id="page-profile" class="page">
                <div class="profile-layout">
                    <div class="profile-card">
                        <div class="avatar">👤</div>
                        <h2 id="profile-email"></h2>
                        <p class="stat">Конспектов: <span id="profile-notes-count">0</span></p>
                        <p class="stat">Чатов: <span id="profile-rooms-count">0</span></p>
                    </div>
                    <div class="profile-notes">
                        <h3>Мои конспекты</h3>
                        <div id="profile-notes-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
